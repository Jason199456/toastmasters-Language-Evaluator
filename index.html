<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>头马语言官</title>
  <style>
    *::before,*::after,*{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
      color:#fff;user-select:none;background:#1a1a2e
    }
    button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
    input,textarea{font-family:inherit;outline:none;border:none}
    #app{height:100%;width:100%;display:flex;flex-direction:column;position:relative}

    /* ========== Card Default BG (black) ========== */
    .card-inner{background:#000}

    /* ========== THEMES ========== */

    /* --- Dream: starry night --- */
    .t-dream .bg1{background:linear-gradient(145deg,#2d1b69,#6c5ce7)}
    .t-dream .bg2{background:linear-gradient(145deg,#6c5ce7,#a29bfe)}
    .t-dream .bg3{background:linear-gradient(145deg,#2d1b69,#a29bfe)}
    .t-dream .bg4{background:linear-gradient(145deg,#6c5ce7,#fd79a8)}
    .t-dream .bg5{background:linear-gradient(145deg,#2d1b69,#fd79a8)}
    .t-dream .pat{background-image:
      radial-gradient(3px 3px at 12% 8%,rgba(255,255,255,.35) 0,transparent 100%),
      radial-gradient(2.5px 2.5px at 48% 5%,rgba(255,255,255,.3) 0,transparent 100%),
      radial-gradient(3.5px 3.5px at 78% 12%,rgba(255,255,255,.3) 0,transparent 100%),
      radial-gradient(2px 2px at 22% 18%,rgba(255,255,255,.25) 0,transparent 100%),
      radial-gradient(2px 2px at 35% 10%,rgba(255,255,255,.22) 0,transparent 100%),
      radial-gradient(2px 2px at 62% 15%,rgba(255,255,255,.2) 0,transparent 100%),
      radial-gradient(2px 2px at 88% 20%,rgba(255,255,255,.18) 0,transparent 100%),
      radial-gradient(1.5px 1.5px at 28% 30%,rgba(255,255,255,.18) 0,transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 25%,rgba(255,255,255,.16) 0,transparent 100%),
      radial-gradient(1px 1px at 42% 45%,rgba(255,255,255,.14) 0,transparent 100%),
      radial-gradient(1px 1px at 68% 40%,rgba(255,255,255,.12) 0,transparent 100%),
      radial-gradient(1.5px 1.5px at 18% 55%,rgba(255,255,255,.1) 0,transparent 100%),
      radial-gradient(120px 120px at 18% 30%,rgba(162,155,254,.07) 0,transparent 100%),
      radial-gradient(100px 100px at 75% 60%,rgba(253,121,168,.06) 0,transparent 100%),
      radial-gradient(140px 140px at 45% 50%,rgba(108,92,231,.04) 0,transparent 100%)}
    .t-dream .d1{width:10px;height:10px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:rgba(255,255,255,.2);top:9%;left:14%}
    .t-dream .d2{width:8px;height:8px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:rgba(255,255,255,.15);top:6%;left:75%}
    .t-dream .d3{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.12);top:55%;left:10%}
    .t-dream .d4{width:14px;height:2px;border-radius:2px;background:rgba(255,255,255,.06);transform:rotate(-25deg);top:25%;left:40%}
    .t-dream .d5{width:12px;height:2px;border-radius:2px;background:rgba(255,255,255,.05);transform:rotate(35deg);top:70%;left:80%}
    .t-dream .d6{width:4px;height:4px;border-radius:50%;background:rgba(255,215,0,.1);top:88%;left:30%}
    .t-dream .d7{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.08);top:45%;left:85%}
    .t-dream .nav-ar,.t-dream .exit-btn,.t-dream .dl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12)}

    /* --- Cyber: neon circuit --- */
    .t-cyber .bg1{background:linear-gradient(145deg,#0d0221,#1a0033)}
    .t-cyber .bg2{background:linear-gradient(145deg,#1a0033,#2d1b69)}
    .t-cyber .bg3{background:linear-gradient(145deg,#0d0221,#2d1b69)}
    .t-cyber .bg4{background:linear-gradient(145deg,#1a0033,#ff2a6d33)}
    .t-cyber .bg5{background:linear-gradient(145deg,#0d0221,#ff2a6d22)}
    .t-cyber .pat{background-image:
      repeating-linear-gradient(rgba(255,255,255,.04) 0 1px,transparent 1px 24px),
      repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 24px),
      radial-gradient(4px 4px at 20% 15%,rgba(255,42,109,.25) 0,transparent 100%),
      radial-gradient(3px 3px at 75% 25%,rgba(5,217,224,.2) 0,transparent 100%),
      radial-gradient(3.5px 3.5px at 45% 70%,rgba(255,42,109,.18) 0,transparent 100%),
      radial-gradient(2.5px 2.5px at 15% 50%,rgba(5,217,224,.15) 0,transparent 100%),
      radial-gradient(2px 2px at 65% 10%,rgba(255,42,109,.12) 0,transparent 100%),
      radial-gradient(2.5px 2.5px at 30% 80%,rgba(162,155,254,.1) 0,transparent 100%),
      radial-gradient(100px 100px at 25% 35%,rgba(255,42,109,.06) 0,transparent 100%),
      radial-gradient(80px 80px at 70% 55%,rgba(5,217,224,.05) 0,transparent 100%),
      radial-gradient(60px 60px at 50% 15%,rgba(162,155,254,.04) 0,transparent 100%)}
    .t-cyber .d1{width:8px;height:8px;transform:rotate(45deg);background:rgba(255,42,109,.2);top:10%;left:12%}
    .t-cyber .d2{width:6px;height:6px;transform:rotate(45deg);background:rgba(5,217,224,.18);top:8%;left:80%}
    .t-cyber .d3{width:5px;height:5px;border-radius:50%;background:rgba(255,42,109,.15);top:52%;left:88%}
    .t-cyber .d4{width:14px;height:2px;border-radius:1px;background:rgba(5,217,224,.08);transform:rotate(45deg);top:35%;left:30%}
    .t-cyber .d5{width:12px;height:2px;border-radius:1px;background:rgba(255,42,109,.07);transform:rotate(-45deg);top:60%;left:15%}
    .t-cyber .d6{width:4px;height:4px;border-radius:50%;background:rgba(255,215,0,.08);top:85%;left:70%}
    .t-cyber .d7{width:6px;height:6px;border:1px solid rgba(5,217,224,.15);background:transparent;top:72%;left:50%}
    .t-cyber .nav-ar,.t-cyber .exit-btn,.t-cyber .dl-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,42,109,.25)}

    /* --- Nature: landscape --- */
    .t-nature .bg1{background:linear-gradient(165deg,#0b2d1b,#1a4a2e)}
    .t-nature .bg2{background:linear-gradient(165deg,#1a4a2e,#2d6b4a)}
    .t-nature .bg3{background:linear-gradient(165deg,#0b2d1b,#2d6b4a)}
    .t-nature .bg4{background:linear-gradient(165deg,#1a4a2e,#4a8c6a)}
    .t-nature .bg5{background:linear-gradient(165deg,#0b2d1b,#4a8c6a)}
    .t-nature .pat{background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 400 420'%3E%3Cpath d='M0,170 Q70,110 140,145 Q210,90 280,130 Q350,85 400,118 L400,420 L0,420Z' fill='rgba(255,255,255,.025)'/%3E%3Cpath d='M0,240 Q60,175 130,210 Q200,160 270,195 Q340,150 400,182 L400,420 L0,420Z' fill='rgba(255,255,255,.035)'/%3E%3C/svg%3E")}
    .t-nature .d1{width:9px;height:9px;border-radius:0 50% 50% 50%;background:rgba(143,188,143,.18);top:10%;left:10%}
    .t-nature .d2{width:7px;height:7px;border-radius:0 50% 50% 50%;background:rgba(143,188,143,.14);top:7%;left:78%}
    .t-nature .d3{width:5px;height:5px;border-radius:50%;background:rgba(143,188,143,.12);top:55%;left:90%}
    .t-nature .d4{width:8px;height:8px;border-radius:0 50% 50% 50%;background:rgba(143,188,143,.1);top:72%;left:8%}
    .t-nature .d5{width:12px;height:2px;border-radius:2px;background:rgba(143,188,143,.06);transform:rotate(-15deg);top:30%;left:45%}
    .t-nature .d6{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.06);top:88%;left:55%}
    .t-nature .d7{width:6px;height:6px;border-radius:50% 0 50% 0;background:rgba(143,188,143,.08);top:45%;left:15%}
    .t-nature .nav-ar,.t-nature .exit-btn,.t-nature .dl-btn{background:rgba(255,255,255,.06);border:1px solid rgba(143,188,143,.25)}

    /* --- Sky: clouds --- */
    .t-sky .bg1{background:linear-gradient(160deg,#1a3a5c,#2d6a9f)}
    .t-sky .bg2{background:linear-gradient(160deg,#2d6a9f,#6bb5e0)}
    .t-sky .bg3{background:linear-gradient(160deg,#1a3a5c,#6bb5e0)}
    .t-sky .bg4{background:linear-gradient(160deg,#2d6a9f,#a8d8ea)}
    .t-sky .bg5{background:linear-gradient(160deg,#1a3a5c,#a8d8ea)}
    .t-sky .pat{background-image:
      radial-gradient(ellipse 70px 28px at 12% 18%,rgba(255,255,255,.12) 0,transparent 100%),
      radial-gradient(ellipse 50px 22px at 20% 15%,rgba(255,255,255,.1) 0,transparent 100%),
      radial-gradient(ellipse 90px 32px at 48% 16%,rgba(255,255,255,.08) 0,transparent 100%),
      radial-gradient(ellipse 60px 25px at 38% 12%,rgba(255,255,255,.07) 0,transparent 100%),
      radial-gradient(ellipse 75px 30px at 80% 20%,rgba(255,255,255,.1) 0,transparent 100%),
      radial-gradient(ellipse 50px 22px at 30% 32%,rgba(255,255,255,.06) 0,transparent 100%),
      radial-gradient(ellipse 55px 24px at 62% 35%,rgba(255,255,255,.05) 0,transparent 100%),
      radial-gradient(ellipse 40px 18px at 90% 28%,rgba(255,255,255,.05) 0,transparent 100%),
      radial-gradient(90px 90px at 85% 10%,rgba(240,217,181,.1) 0,transparent 100%),
      radial-gradient(50px 50px at 85% 10%,rgba(255,255,200,.06) 0,transparent 100%)}
    .t-sky .d1{width:10px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);top:35%;left:12%}
    .t-sky .d2{width:8px;height:6px;border-radius:50%;background:rgba(255,255,255,.1);top:12%;left:55%}
    .t-sky .d3{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.07);top:55%;left:82%}
    .t-sky .d4{width:12px;height:5px;border-radius:50%;background:rgba(255,255,255,.08);top:70%;left:25%}
    .t-sky .d5{width:7px;height:5px;border-radius:50%;background:rgba(255,255,255,.06);top:28%;left:70%}
    .t-sky .d6{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.05);top:85%;left:50%}
    .t-sky .d7{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.05);top:48%;left:45%}
    .t-sky .nav-ar,.t-sky .exit-btn,.t-sky .dl-btn{background:rgba(255,255,255,.06);border:1px solid rgba(240,217,181,.25)}

    /* --- Chinese: classical --- */
    .t-chinese .bg1{background:linear-gradient(150deg,#3d0a0a,#6b1d1d)}
    .t-chinese .bg2{background:linear-gradient(150deg,#6b1d1d,#8b3a3a)}
    .t-chinese .bg3{background:linear-gradient(150deg,#3d0a0a,#8b3a3a)}
    .t-chinese .bg4{background:linear-gradient(150deg,#5a1515,#7a2a2a)}
    .t-chinese .bg5{background:linear-gradient(150deg,#3d0a0a,#5a1515)}
    .t-chinese .pat{background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 400 420'%3E%3Crect x='15' y='15' width='370' height='390' fill='none' stroke='rgba(212,175,55,.04)' stroke-width='1' rx='4'/%3E%3Cg fill='none' stroke='rgba(212,175,55,.07)' stroke-width='1.1'%3E%3Cpath d='M40 90 Q60 60 80 70 Q100 55 120 65 Q140 52 160 65 Q180 50 200 65 L220 75'/%3E%3Cpath d='M250 110 Q270 85 290 95 Q310 83 325 93 Q340 83 355 93 L370 100'/%3E%3C/g%3E%3Cpath d='M25 30 L25 20 L35 20' fill='none' stroke='rgba(212,175,55,.07)' stroke-width='1.5'/%3E%3Cpath d='M375 30 L375 20 L365 20' fill='none' stroke='rgba(212,175,55,.07)' stroke-width='1.5'/%3E%3C/svg%3E");background-position:center center;background-size:100% 100%;background-repeat:no-repeat}
    .t-chinese .d1{width:8px;height:8px;transform:rotate(45deg);background:rgba(212,175,55,.18);top:8%;left:18%}
    .t-chinese .d2{width:6px;height:6px;border-radius:50%;background:rgba(212,175,55,.14);top:5%;left:72%}
    .t-chinese .d3{width:8px;height:8px;transform:rotate(45deg);background:rgba(212,175,55,.12);top:50%;left:10%}
    .t-chinese .d4{width:6px;height:6px;border-radius:50%;background:rgba(212,175,55,.1);top:68%;left:85%}
    .t-chinese .d5{width:14px;height:2px;border-radius:2px;background:rgba(212,175,55,.07);transform:rotate(-20deg);top:35%;left:55%}
    .t-chinese .d6{width:4px;height:4px;border-radius:50%;background:rgba(212,175,55,.08);top:85%;left:42%}
    .t-chinese .d7{width:5px;height:5px;transform:rotate(45deg);background:rgba(212,175,55,.06);top:42%;left:80%}
    .t-chinese .card-inner{border-color:rgba(212,175,55,.2)}
    .t-chinese .card-inner::before,.t-chinese .card-inner::after{border-color:rgba(212,175,55,.25)}
    .t-chinese .deco-line{background:linear-gradient(90deg,transparent,rgba(212,175,55,.1),transparent)!important}
    .t-chinese .nav-ar,.t-chinese .exit-btn,.t-chinese .dl-btn{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2)}

    /* ========== HEADER ========== */
    header{position:sticky;top:0;z-index:30;flex-shrink:0;background:#FFF;color:#2D3436;padding:10px 10px 6px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .club-name-area{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 6px;border-radius:8px;cursor:pointer;border:1.5px dashed #D5D0CC;background:#FAF8F6;transition:all .25s;max-width:80%}
    .club-name-area:hover{border-color:#6C5CE7;background:#F5F0FF}
    .club-name-area .icon-edit{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#6C5CE7;color:#FFF;font-size:11px;line-height:1;flex-shrink:0}
    #clubNameDisplay{font-size:18px;font-weight:700;color:#2D3436;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #clubNameInput{font-size:16px;font-weight:700;color:#2D3436;background:#FFF;border:2px solid #6C5CE7;border-radius:6px;padding:2px 8px;width:160px;text-align:center;display:none}
    .subtitle{font-size:13px;font-weight:600;color:#E17055;letter-spacing:3px;margin-top:2px}
    .header-actions{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;flex-wrap:wrap}
    .theme-wrap{position:relative;display:inline-block}
    .theme-btn{display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:#F8F6FF;border:1.5px solid #D8D0F0;color:#6C5CE7;cursor:pointer}
    .theme-btn:active{transform:scale(.95)}
    .theme-btn .arr{font-size:9px;transition:transform .2s}
    .theme-btn .arr.up{transform:rotate(180deg)}
    .theme-drop{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#FFF;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.15);display:none;z-index:50;min-width:130px;overflow:hidden;padding:4px}
    .theme-drop.open{display:block}
    .theme-drop button{display:block;width:100%;padding:8px 12px;font-size:12px;font-weight:500;text-align:left;border-radius:6px;background:none;color:#444;cursor:pointer}
    .theme-drop button:hover{background:#F5F0FF}
    .theme-drop button.act{background:#6C5CE7;color:#FFF}
    .hdr-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:7px;font-size:12px;font-weight:500;transition:all .2s;background:#F0EDEA;color:#555}
    .hdr-btn:active{transform:scale(.93)}
    .hdr-btn .hi{font-size:13px;line-height:1}
    .hdr-btn .hl{font-size:11px}
    .hdr-btn.pri{background:#6C5CE7;color:#FFF}
    .hdr-btn.dan{color:#E17055}

    /* ========== Edit Mode ========== */
    #editMode{flex:1;padding:8px 12px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;background:#F3F1EE;color:#2D3436;-webkit-overflow-scrolling:touch}
    #editMode::-webkit-scrollbar{width:4px}
    #editMode::-webkit-scrollbar-thumb{background:#DDD;border-radius:2px}
    .card-edit{background:#FFF;border-radius:10px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,.04);border-left:4px solid #DDD;position:relative}
    .card-edit .lbl{font-size:10px;font-weight:600;color:#999;margin-bottom:4px}
    .card-edit textarea{width:100%;min-height:44px;max-height:110px;font-size:13px;line-height:1.6;color:#2D3436;background:#FAFAFA;border-radius:8px;padding:6px 10px;resize:vertical}
    .card-edit textarea:focus{background:#FFF;box-shadow:inset 0 0 0 1.5px #6C5CE7}
    .card-edit .del{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:#F0EDEA;color:#999;font-size:11px;display:flex;align-items:center;justify-content:center}
    .card-edit .del:hover{background:#FFE0D6;color:#E17055}
    .btn-add{color:#6C5CE7;font-size:12px;font-weight:500;padding:4px 0;display:flex;align-items:center;gap:4px}

    /* ========== Browse Mode ========== */
    #browseMode{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;overflow:hidden;background:#000}
    .card-full{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:14px;transition:opacity .4s ease,transform .4s cubic-bezier(.25,.46,.45,.94)}
    .card-full.prev{transform:translateX(-100%);opacity:0}
    .card-full.active{transform:translateX(0);opacity:1}
    .card-full.next{transform:translateX(100%);opacity:0}
    .card-inner{width:100%;max-width:560px;height:calc(100% - 48px);max-height:780px;border:1.5px solid rgba(255,255,255,.15);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06)}
    .card-inner .pat{position:absolute;inset:0;z-index:0;pointer-events:none;background-position:center bottom;background-size:100% 100%;background-repeat:no-repeat}
    .card-inner .deco-html{position:absolute;inset:0;z-index:1;pointer-events:none}
    .card-inner .deco-html i{position:absolute}
    .card-inner .txt{position:relative;z-index:2;font-size:clamp(20px,5.5vw,38px);font-weight:600;line-height:1.7;text-align:center;width:100%;word-break:break-word;text-shadow:0 2px 20px rgba(0,0,0,.3);padding:12px 0}
    .card-inner .num{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:500;opacity:.2;letter-spacing:1px;z-index:2}
    .card-inner .deco-line{position:absolute;left:20px;right:20px;height:1px;z-index:2;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
    .card-inner .deco-line.t{top:34px}
    .card-inner .deco-line.b{bottom:34px}
    .card-inner::before,.card-inner::after{content:'';position:absolute;z-index:2;width:16px;height:16px;border-color:rgba(255,255,255,.15);border-style:solid}
    .card-inner::before{top:14px;left:14px;border-top-width:2px;border-left-width:2px;border-radius:3px 0 0 0}
    .card-inner::after{bottom:14px;right:14px;border-bottom-width:2px;border-right-width:2px;border-radius:0 0 3px 0}

    .exit-btn{position:fixed;top:10px;right:10px;z-index:120;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;backdrop-filter:blur(4px);color:rgba(255,255,255,.6);background:rgba(0,0,0,.25)}.exit-btn:active{transform:scale(.85)}
    .dl-btn{position:fixed;bottom:14px;left:14px;z-index:120;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;background:rgba(255,255,255,.12);backdrop-filter:blur(4px);color:#FFF;border:1px solid rgba(255,255,255,.15);box-shadow:0 2px 8px rgba(0,0,0,.15)}.dl-btn:hover{background:rgba(255,255,255,.2)}.dl-btn:active{transform:scale(.85)}
    .nav-ar{position:fixed;bottom:14px;transform:none;z-index:110;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;background:rgba(255,255,255,.1);backdrop-filter:blur(4px);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.1)}.nav-ar:active{transform:scale(.88)}.nav-ar:disabled{opacity:.15;pointer-events:none}
    .nav-ar.l{left:calc(50% - 60px)}
    .nav-ar.r{right:calc(50% - 60px)}

    /* ========== Modal & Toast ========== */
    .modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
    .modal-ov.open{opacity:1;pointer-events:auto}
    .modal-sh{background:#FFF;border-radius:20px 20px 0 0;padding:16px 20px 26px;width:100%;color:#2D3436;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70vh;overflow-y:auto}
    .modal-ov.open .modal-sh{transform:translateY(0)}
    .modal-h{width:32px;height:4px;background:#DDD;border-radius:2px;margin:0 auto 12px}
    .modal-sh .t{font-size:15px;font-weight:600;margin-bottom:10px}
    .modal-sh .acts .btn{flex:1;justify-content:center;padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;background:#6C5CE7;color:#FFF}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(45,52,54,.92);color:#FFF;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:all .35s;z-index:300;pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(min-width:768px){
      header{padding:14px 18px 10px}
      .club-name-area{padding:5px 14px 5px 8px}
      #clubNameDisplay{font-size:22px}
      .subtitle{font-size:14px;letter-spacing:4px}
      .card-full{padding:24px}
      .card-inner{padding:52px 44px}
      .card-inner .txt{font-size:clamp(26px,3.8vw,42px)}
      .nav-ar{width:40px;height:40px;font-size:20px}
      .exit-btn,.dl-btn{width:34px;height:34px;font-size:16px}
      .exit-btn{top:16px;right:16px}.dl-btn{bottom:18px;left:18px}
    }
    @media(min-width:1024px){
      #clubNameDisplay{font-size:24px}
      .card-inner{max-width:620px;max-height:840px}
      .card-inner .txt{font-size:clamp(30px,3.2vw,48px)}
    }
    @media(max-width:420px){
      header{padding:7px 8px 5px}
      #clubNameDisplay{font-size:15px}
      .subtitle{font-size:11px}
      .card-inner{padding:28px 18px;border-radius:14px;height:calc(100% - 40px)}
      .card-inner .txt{font-size:clamp(18px,5vw,28px)}
      .card-full{padding:10px}
      .nav-ar{width:32px;height:32px;font-size:16px}
      .nav-ar.l{left:calc(50% - 45px)}
      .nav-ar.r{right:calc(50% - 45px)}
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="club-name-area" onclick="editClubName()" title="点击编辑">
      <span class="icon-edit">✎</span>
      <span id="clubNameDisplay">申花头马俱乐部</span>
      <input type="text" id="clubNameInput" placeholder="输入名称" onblur="saveClubName()" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
    <div class="subtitle">语言官</div>
    <div class="header-actions">
      <div class="theme-wrap">
        <button class="theme-btn" onclick="toggleTheme()">风格 <span class="arr" id="themeArr">▼</span></button>
        <div class="theme-drop" id="themeDrop">
          <button onclick="selTheme('dream')">🌈 梦境</button>
          <button onclick="selTheme('cyber')">🤖 赛博</button>
          <button onclick="selTheme('nature')">🌿 山水</button>
          <button onclick="selTheme('sky')">☁️ 蓝天</button>
          <button onclick="selTheme('chinese')">🏮 中国风</button>
        </div>
      </div>
      <button class="hdr-btn pri" onclick="startBrowsing()"><span class="hi">👁️</span><span class="hl">预览</span></button>
      <button class="hdr-btn" onclick="shareCards()"><span class="hi">🔗</span><span class="hl">分享</span></button>
      <button class="hdr-btn dan" onclick="clearAll()"><span class="hi">🗑️</span><span class="hl">清空</span></button>
    </div>
  </header>
  <div id="editMode"><div id="editorList"></div><button class="btn-add" onclick="addCard()">＋ 添加一张卡片</button></div>
  <div id="browseMode">
    <button class="exit-btn" onclick="exitBrowse()">✕</button>
    <button class="dl-btn" onclick="downloadCard()" title="下载">⬇️</button>
    <button class="nav-ar l" id="prevBtn" onclick="prevCard()">‹</button>
    <button class="nav-ar r" id="nextBtn" onclick="nextCard()">›</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
let cards=[],cur=0,curTheme='dream';
const T={dream:'t-dream',cyber:'t-cyber',nature:'t-nature',sky:'t-sky',chinese:'t-chinese'},TK=Object.keys(T);
const DEC={dream:'<i class="d d1"></i><i class="d d2"></i><i class="d d3"></i><i class="d d4"></i><i class="d d5"></i><i class="d d6"></i><i class="d d7"></i>',cyber:'<i class="d d1"></i><i class="d d2"></i><i class="d d3"></i><i class="d d4"></i><i class="d d5"></i><i class="d d6"></i><i class="d d7"></i>',nature:'<i class="d d1"></i><i class="d d2"></i><i class="d d3"></i><i class="d d4"></i><i class="d d5"></i><i class="d d6"></i><i class="d d7"></i>',sky:'<i class="d d1"></i><i class="d d2"></i><i class="d d3"></i><i class="d d4"></i><i class="d d5"></i><i class="d d6"></i><i class="d d7"></i>',chinese:'<i class="d d1"></i><i class="d d2"></i><i class="d d3"></i><i class="d d4"></i><i class="d d5"></i><i class="d d6"></i><i class="d d7"></i>'};

function init(){
  const n=localStorage.getItem('tm_clubName');if(n)document.getElementById('clubNameDisplay').textContent=n;
  const t=localStorage.getItem('tm_theme');if(t&&T[t]){curTheme=t;TK.forEach(x=>document.body.classList.remove(T[x]));document.body.classList.add(T[t])}else setTheme('dream');
  const h=window.location.hash;
  if(h&&h.length>1){try{const p=JSON.parse(atob(decodeURIComponent(h.slice(1))));if(Array.isArray(p)&&p.length>0){cards=p;renderEditors();goBrowse();renderCards();return}}catch(e){}}
  const s=localStorage.getItem('tm_cards');if(s){try{cards=JSON.parse(s)}catch(e){cards=[]}}
  if(cards.length===0)cards=['',''];renderEditors();
  if(!localStorage.getItem('tm_visitor'))localStorage.setItem('tm_visitor',genId().slice(0,8));
}
function genId(){return crypto.randomUUID?.()||Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function editClubName(){const d=document.getElementById('clubNameDisplay'),i=document.getElementById('clubNameInput');i.value=d.textContent;d.style.display='none';i.style.display='inline-block';i.focus();i.select()}
function saveClubName(){const d=document.getElementById('clubNameDisplay'),i=document.getElementById('clubNameInput');const n=i.value.trim()||'头马俱乐部';d.textContent=n;d.style.display='inline';i.style.display='none';localStorage.setItem('tm_clubName',n);toast('已保存')}
function toggleTheme(){document.getElementById('themeDrop').classList.toggle('open');document.getElementById('themeArr').classList.toggle('up')}
function closeTheme(){document.getElementById('themeDrop').classList.remove('open');document.getElementById('themeArr').classList.remove('up')}
function selTheme(k){closeTheme();setTheme(k)}
function setTheme(k){if(!T[k])return;curTheme=k;TK.forEach(x=>document.body.classList.remove(T[x]));document.body.classList.add(T[k]);localStorage.setItem('tm_theme',k);document.querySelectorAll('#themeDrop button').forEach(b=>b.classList.toggle('act',b.getAttribute('onclick')==="selTheme('"+k+"')"));if(document.getElementById('browseMode').style.display!=='none')renderCards()}
function addCard(c){cards.push(c||'');renderEditors();setTimeout(()=>{const l=document.getElementById('editorList'),e=l.lastElementChild;if(e&&e.querySelector('textarea'))e.querySelector('textarea').focus();l.scrollTop=l.scrollHeight},50)}
function deleteCard(i){if(cards.length<=1){toast('至少保留一张');return}cards.splice(i,1);renderEditors()}
function clearAll(){if(cards.every(c=>!c.trim()))return;if(!confirm('清空所有卡片？'))return;cards=[''];renderEditors();toast('已清空')}
function updCard(i,v){cards[i]=v;localStorage.setItem('tm_cards',JSON.stringify(cards))}
function renderEditors(){const l=document.getElementById('editorList');l.innerHTML='';cards.forEach((c,i)=>{const d=document.createElement('div');d.className='card-edit';d.innerHTML='<div class="lbl">卡片 '+(i+1)+'</div><button class="del" onclick="deleteCard('+i+')">✕</button><textarea placeholder="输入一句话…" oninput="updCard('+i+',this.value)" rows="'+Math.max(2,Math.ceil(c.length/30))+'">'+esc(c)+'</textarea>';l.appendChild(d)});localStorage.setItem('tm_cards',JSON.stringify(cards))}
function goBrowse(){document.getElementById('browseMode').style.display='block';const v=cards.filter(c=>c.trim());if(v.length>0)cur=0;renderCards()}
function exitBrowse(){document.getElementById('browseMode').style.display='none';renderEditors()}
function renderCards(){const stage=document.getElementById('browseMode');document.querySelectorAll('#browseMode>.card-full').forEach(el=>el.remove());const valid=cards.filter(c=>c.trim());if(valid.length===0){const e=document.createElement('div');e.className='card-full active';e.innerHTML='<div class="card-inner"><div class="pat"></div><div class="txt" style="opacity:.5;font-size:18px">还没有卡片</div></div>';stage.appendChild(e);document.getElementById('prevBtn').disabled=true;document.getElementById('nextBtn').disabled=true;return}if(cur>=valid.length)cur=0;if(cur<0)cur=0;valid.forEach((c,i)=>{const d=document.createElement('div');d.className='card-full';if(i===cur)d.classList.add('active');else if(i<cur)d.classList.add('prev');else d.classList.add('next');d.innerHTML='<div class="card-inner bg'+(i%5+1)+'"><div class="pat"></div><div class="deco-html">'+DEC[curTheme]+'</div><div class="deco-line t"></div><div class="txt">'+esc(c).replace(/\n/g,'<br>')+'</div><div class="deco-line b"></div><div class="num">'+(i+1)+'/'+valid.length+'</div></div>';stage.appendChild(d)});document.getElementById('prevBtn').disabled=cur<=0;document.getElementById('nextBtn').disabled=cur>=valid.length-1}
function goTo(i){const v=cards.filter(c=>c.trim());if(i<0)i=0;if(i>=v.length)i=Math.max(0,v.length-1);if(i===cur)return;cur=i;renderCards()}
function prevCard(){goTo(cur-1)}function nextCard(){goTo(cur+1)}
function startBrowsing(){const v=cards.filter(c=>c.trim());if(v.length===0){toast('请先输入内容');return}recordQuotes();goBrowse()}
function shareCards(){const v=cards.filter(c=>c.trim());if(v.length===0){toast('还没有内容');return}recordQuotes();const enc=encodeURIComponent(btoa(JSON.stringify(v)));const url=window.location.origin+window.location.pathname+'#'+enc;if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(url).then(()=>toast('链接已复制 ✓')).catch(()=>fallbackCopy(url));else fallbackCopy(url)}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('链接已复制 ✓')}catch(e){toast('复制失败')};document.body.removeChild(ta)}
function getQuotes(){try{return JSON.parse(localStorage.getItem('tm_quotes'))||[]}catch(e){return[]}}
function saveQuotes(q){localStorage.setItem('tm_quotes',JSON.stringify(q))}
async function recordQuotes(){const v=cards.filter(c=>c.trim());if(v.length===0)return;const qs=getQuotes();let ip='';try{const r=await fetch('https://api.ipify.org?format=json');if(r.ok){const d=await r.json();ip=d.ip}}catch(e){}qs.push({id:genId(),timestamp:new Date().toISOString(),club:document.getElementById('clubNameDisplay').textContent,theme:curTheme,cardCount:v.length,cards:v,ip:ip,visitor:localStorage.getItem('tm_visitor')||''});saveQuotes(qs)}
function getGhConfig(){try{return JSON.parse(localStorage.getItem('tm_gh_config'))||{}}catch(e){return{}}}
function saveGhConfig(c){localStorage.setItem('tm_gh_config',JSON.stringify(c))}
let hc=0;document.addEventListener('dblclick',e=>{if(e.target.closest('.club-name-area')){hc++;if(hc>=3){hc=0;syncQuotesToGh()}}});
async function syncQuotesToGh(){const cfg=getGhConfig();if(!cfg.token||!cfg.repo){toast('未配置 GitHub');return}const qs=getQuotes();if(qs.length===0){toast('没有金句');return}try{let sha=null,existing=[];const getR=await fetch('https://api.github.com/repos/'+cfg.repo+'/contents/'+(cfg.path||'quotes/quotes.json'),{headers:{Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github.v3+json'}});if(getR.ok){const d=await getR.json();sha=d.sha;try{existing=JSON.parse(atob(d.content))}catch(e){existing=[]}}const existingIds=new Set(existing.map(e=>e.id));const merged=[...existing,...qs.filter(q=>!existingIds.has(q.id))];const putR=await fetch('https://api.github.com/repos/'+cfg.repo+'/contents/'+(cfg.path||'quotes/quotes.json'),{method:'PUT',headers:{Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'sync '+qs.length+' quotes',content:btoa(unescape(encodeURIComponent(JSON.stringify(merged,null,2)))),sha:sha||undefined})});if(!putR.ok)throw new Error('同步失败');toast('同步成功 ✓')}catch(e){toast('同步失败')}}
let hc2=0;document.addEventListener('click',e=>{if(e.target.closest('.club-name-area')){hc2++;if(hc2>=5){hc2=0;const c=getGhConfig();const t=prompt('GitHub Token:',c.token||'');if(t===null)return;const r=prompt('仓库 (owner/repo):',c.repo||'');if(r===null)return;const p=prompt('文件路径:',c.path||'quotes/quotes.json')||'quotes/quotes.json';if(p===null)return;saveGhConfig({token:t,repo:r,path:p});toast('GitHub 已配置')}}});
function loadHtml2Canvas(cb){if(window.html2canvas){cb();return}const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';s.onload=cb;s.onerror=()=>toast('加载失败');document.head.appendChild(s)}
function downloadCard(){const active=document.querySelector('#browseMode .card-full.active');if(!active){toast('没有卡片');return}const ci=active.querySelector('.card-inner');if(!ci){toast('未找到卡片');return}loadHtml2Canvas(()=>{html2canvas(ci,{scale:2,useCORS:true,allowTaint:true}).then(c=>{const a=document.createElement('a');a.download='touma-card-'+(cur+1)+'.png';a.href=c.toDataURL('image/png');a.click();toast('已下载 ✓')}).catch(e=>{toast('下载失败')})})}
document.addEventListener('click',e=>{if(!e.target.closest('.theme-wrap'))closeTheme()});
let tx=0,lastTap=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{if(document.getElementById('browseMode').style.display==='none')return;const d=tx-e.changedTouches[0].screenX;if(Math.abs(d)>40){if(d>0)nextCard();else prevCard()}},{passive:true});
document.addEventListener('keydown',e=>{if(document.getElementById('browseMode').style.display==='none')return;if(e.key==='ArrowLeft')prevCard();if(e.key==='ArrowRight')nextCard();if(e.key==='Escape')exitBrowse()});
let tt=null;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2200)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
init();
</script>
</body>
</html>
